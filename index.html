<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор карт Таро</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin-bottom: 16px;
        }

        /* ВАЖНО: фон + padding, чтобы input был виден */
        #questionInput {
            width: 90%;
            padding: 12px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            display: block;
            background: #222;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            justify-items: center;
            margin-top: 10px;
        }

        .card {
            width: 100px;
            height: 160px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #444;
            transform-style: preserve-3d;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
        }

        .card-back {
            background-image: url("back.png");
        }

        .card-front {
            transform: rotateY(180deg);
        }

        .selected {
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.9);
            border-color: #ffd700;
        }

        #confirmBtn {
            margin-top: 24px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: #fff;
            cursor: pointer;
            display: none;
        }

        #confirmBtn:disabled {
            opacity: 0.6;
            cursor: default;
        }
    </style>
</head>

<body>

<h2 id="statusText">Введите вопрос и выберите 3 карты</h2>

<!-- ВАЖНО: input теперь точно виден -->
<!-- <input id="questionInput" 
       placeholder="Введите ваш вопрос..." 
       style="
           width: 90%;
           padding: 14px;
           margin: 20px auto;
           border-radius: 10px;
           border: 2px solid #555;
           background: #1c1c1c;
           color: #fff;
           font-size: 16px;
           display: block;
           box-sizing: border-box;
       "> -->

<div class="grid" id="cards"></div>
<button id="confirmBtn">Подтвердить выбор</button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    
// --- ВСЕ КАРТЫ ---
const cards = [
    "major_arcana_fool.png","major_arcana_magician.png","major_arcana_priestess.png",
    "major_arcana_empress.png","major_arcana_emperor.png","major_arcana_hierophant.png",
    "major_arcana_lovers.png","major_arcana_chariot.png","major_arcana_strength.png",
    "major_arcana_hermit.png","major_arcana_fortune.png","major_arcana_justice.png",
    "major_arcana_hanged.png","major_arcana_death.png","major_arcana_temperance.png",
    "major_arcana_devil.png","major_arcana_tower.png","major_arcana_star.png",
    "major_arcana_moon.png","major_arcana_sun.png","major_arcana_judgement.png",
    "major_arcana_world.png",

    "minor_arcana_cups_ace.png","minor_arcana_cups_2.png","minor_arcana_cups_3.png",
    "minor_arcana_cups_4.png","minor_arcana_cups_5.png","minor_arcana_cups_6.png",
    "minor_arcana_cups_7.png","minor_arcana_cups_8.png","minor_arcana_cups_9.png",
    "minor_arcana_cups_10.png","minor_arcana_cups_page.png","minor_arcana_cups_knight.png",
    "minor_arcana_cups_queen.png","minor_arcana_cups_king.png",

    "minor_arcana_pentacles_ace.png","minor_arcana_pentacles_2.png","minor_arcana_pentacles_3.png",
    "minor_arcana_pentacles_4.png","minor_arcana_pentacles_5.png","minor_arcana_pentacles_6.png",
    "minor_arcana_pentacles_7.png","minor_arcana_pentacles_8.png","minor_arcana_pentacles_9.png",
    "minor_arcana_pentacles_10.png","minor_arcana_pentacles_page.png","minor_arcana_pentacles_knight.png",
    "minor_arcana_pentacles_queen.png","minor_arcana_pentacles_king.png",

    "minor_arcana_swords_ace.png","minor_arcana_swords_2.png","minor_arcana_swords_3.png",
    "minor_arcana_swords_4.png","minor_arcana_swords_5.png","minor_arcana_swords_6.png",
    "minor_arcana_swords_7.png","minor_arcana_swords_8.png","minor_arcana_swords_9.png",
    "minor_arcana_swords_10.png","minor_arcana_swords_page.png","minor_arcana_swords_knight.png",
    "minor_arcana_swords_queen.png","minor_arcana_swords_king.png",

    "minor_arcana_wands_ace.png","minor_arcana_wands_2.png","minor_arcana_wands_3.png",
    "minor_arcana_wands_4.png","minor_arcana_wands_5.png","minor_arcana_wands_6.png",
    "minor_arcana_wands_7.png","minor_arcana_wands_8.png","minor_arcana_wands_9.png",
    "minor_arcana_wands_10.png","minor_arcana_wands_page.png","minor_arcana_wands_knight.png",
    "minor_arcana_wands_queen.png","minor_arcana_wands_king.png"
];

// --- ПЕРЕМЕШАТЬ ---
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

shuffle(cards);
const sixCards = cards.slice(0, 6);

const grid = document.getElementById("cards");
const confirmBtn = document.getElementById("confirmBtn");
const statusText = document.getElementById("statusText");

let selected = [];

// --- РЕНДЕР ---
sixCards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";

    const inner = document.createElement("div");
    inner.className = "card-inner";

    const back = document.createElement("div");
    back.className = "card-face card-back";

    const front = document.createElement("div");
    front.className = "card-face card-front";
    front.style.backgroundImage = `url("cards/${card}")`;

    inner.appendChild(back);
    inner.appendChild(front);
    div.appendChild(inner);

    div.onclick = () => {
        if (selected.length >= 3) return;
        if (div.classList.contains("selected")) return;

        div.classList.add("flipped", "selected");
        selected.push(card);

        const left = 3 - selected.length;
        statusText.textContent = left > 0
            ? `Осталось выбрать: ${left}`
            : "Вы выбрали 3 карты";

        if (selected.length === 3) {
            confirmBtn.style.display = "inline-block";
        }
    };

    grid.appendChild(div);
});

// --- ОТПРАВКА ---
confirmBtn.onclick = () => {
    confirmBtn.disabled = true;

const payload = { cards: selected };
Telegram.WebApp.sendData(JSON.stringify(payload));


    Telegram.WebApp.sendData(JSON.stringify(payload));
};

// --- INIT ---
Telegram.WebApp.ready();
</script>

</body>
</html>
